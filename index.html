<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The New Birth</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#000;
    color:white;
    text-align:center;
    overflow-x:hidden;
}

#rotate{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:999;
    font-size:22px;
}

.phone{
    width:50px;
    height:90px;
    border:3px solid white;
    border-radius:10px;
    margin:auto;
    animation:rotate 2s infinite;
}

@keyframes rotate{
    0%{transform:rotate(0);}
    50%{transform:rotate(90deg);}
    100%{transform:rotate(0);}
}

@media (orientation:landscape){
#rotate{
    display:none;
}
}

.container{
    padding:60px 20px;
}

h1{
    font-size:45px;
    letter-spacing:5px;
}

.chapter{
    margin-top:100px;
}

p{
    font-size:24px;
    color:#bdbdbd;
    margin-bottom:40px;
}

.red{
    color:red;
}

button{
    background:white;
    color:black;
    border:none;
    padding:18px 60px;
    border-radius:50px;
    font-size:24px;
    cursor:pointer;
}

button:hover{
    background:red;
    color:white;
}

.hidden{
    display:none;
}

.gallery{
    display:grid;
    gap:20px;
    margin-top:40px;
}

.gallery img{
    width:100%;
    border-radius:15px;
}
</style>

</head>

<body>

<div id="rotate">
<div>
<div class="phone"></div>
<br>
Rotate your phone
</div>
</div>


<div class="container" id="home">

<h1>THE NEW BIRTH</h1>

<p>
Every scar has a story.<br>
Every chapter has a meaning.
</p>

<button onclick="enter()">ENTER</button>

</div>


<div class="container hidden" id="story">


<div class="chapter">

<h1>01</h1>

<p>
The First Chapter
</p>

<p>
And the love of my life said once,
<br>
"<span class="red">Try for yourself... and for me...!</span>"
</p>

</div>



<div class="chapter">

<h1>02</h1>

<p>
Memories
</p>


<div class="gallery">

<img src="chapter1-1.jpg">
<img src="chapter1-2.jpg">
<img src="chapter1-3.jpg">
<img src="chapter1-4.jpg">
<img src="chapter1-5.jpg">

</div>

</div>



<div class="chapter">

<h1>03</h1>

<p>
Never Look Back
<br>
No Risk No Story
<br>
Don't Trust Damn Humans
</p>

</div>


</div>


<script>

function enter(){

document.getElementById("home").classList.add("hidden");

document.getElementById("story").classList.remove("hidden");

}

</script>


</body>
</html>
