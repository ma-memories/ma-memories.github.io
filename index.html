<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MA Memories</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #000;
    color: #fff;
    overflow: hidden; /* منع السحب في البداية */
}

/* شاشة البداية + إنميشن التفتح البطيء عند فتح اللينك */
#intro-screen {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    width: 100%;
    padding: 20px;
    position: relative;
    z-index: 10;
    transition: opacity 1.5s ease-in-out;
    
    /* استدعاء إنميشن التفتح البطيء هنا (بياخد 3.5 ثانية) */
    animation: bloomIn 3.5s ease-out forwards;
}

/* كود إنميشن التفتح البطيء السينمائي */
@keyframes bloomIn {
    0% {
        opacity: 0;
        filter: blur(10px); /* يبدأ بضباب غامض */
        transform: scale(0.95); /* تأثير تكبير بسيط كأنه بيفتح */
    }
    100% {
        opacity: 1;
        filter: blur(0);
        transform: scale(1);
    }
}

.logo {
    width: 220px;
    max-width: 80%;
    margin-bottom: 30px;
}

/* ستايل تركيبة 2 2 4 باللون الأحمر */
.countdown-container {
    display: flex;
    gap: 35px;
    color: #ff0000;
    margin-bottom: 40px;
    text-align: center;
}

.count-box {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.count-box .num {
    font-size: 54px;
    font-weight: bold;
    letter-spacing: 2px;
}

.count-box .label {
    font-size: 16px;
    margin-top: 5px;
    letter-spacing: 1px;
}

/* زرار دخول القصة */
button#enter-btn {
    background: #fff;
    color: #000;
    border: none;
    padding: 18px 45px;
    border-radius: 50px;
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 1px;
    cursor: pointer;
    transition: 0.3s;
}

button#enter-btn:hover {
    background: #ff0000;
    color: #fff;
    box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
}

/* رسالة الـ QR المخفية */
.qr-message {
    font-size: 24px;
    letter-spacing: 2px;
    color: #bdbdbd;
    position: absolute;
    opacity: 0;
    display: none;
    animation: fadeInOut 5s forwards;
}

@keyframes fadeInOut {
    0% { opacity: 0; }
    20% { opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; }
}

/* زر التحكم في الموسيقى */
#music-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    background: transparent;
    color: #fff;
    border: 1px solid #333;
    padding: 8px 18px;
    border-radius: 20px;
    cursor: pointer;
    z-index: 100;
    opacity: 0.5;
    transition: 0.3s;
}

#music-toggle:hover {
    opacity: 1;
}

/* محتوى الموقع الأساسي */
#main-content {
    display: none;
    padding: 0 20px;
    max-width: 800px;
    margin: 0 auto;
    opacity: 0;
}

.section {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 80px 0;
    border-bottom: 1px solid #111;
}

.section h2 {
    font-size: 32px;
    letter-spacing: 2px;
    margin-bottom: 15px;
}

.roman-date {
    font-size: 24px;
    letter-spacing: 5px;
    color: #666;
    margin-top: 10px;
}

.english-date {
    font-size: 16px;
    color: #ff0000;
    margin-top: 5px;
    margin-bottom: 20px;
    letter-spacing: 2px;
}

.sub-message {
    font-size: 18px;
    color: #888;
    max-width: 600px;
    margin-bottom: 40px;
    line-height: 1.6;
}

/* معرض صور الشباتر */
.image-gallery {
    display: flex;
    flex-direction: column;
    gap: 30px; 
    width: 100%;
    max-width: 500px; 
}

.gallery-img {
    width: 100%;
    height: auto;
    filter: grayscale(100%); 
    border: 1px solid #222;
    cursor: pointer;
    transition: transform 0.4s ease, filter 0.4s ease, border-color 0.4s ease;
}

.gallery-img:hover {
    filter: grayscale(0%); 
    transform: scale(1.03); 
    border-color: #ff0000; 
}

/* نافذة تكبير الصور (Lightbox) */
#lightbox {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.95);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
}

#lightbox.active {
    opacity: 1;
    pointer-events: auto;
}

#lightbox-img {
    max-width: 90%;
    max-height: 85vh;
    box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
    border: 1px solid #333;
}
</style>

</head>
<body>

    <button id="music-toggle">🔊 Play</button>
    <audio id="bg-music" loop>
        <source src="I Wanna Be Yours(MP3_160K).mp3" type="audio/mpeg">
    </audio>

    <div id="intro-screen">
        <p class="qr-message" id="qr-msg">You didn't scan a tattoo.<br><br>You entered a story.</p>
        
        <img src="447png.png" alt="MA Logo" class="logo" id="logo-img">
        
        <div class="countdown-container" id="countdown-block">
            <div class="count-box">
                <span class="num">2</span>
                <span class="label">today</span>
            </div>
            <div class="count-box">
                <span class="num">2</span>
                <span class="label">tomorrow</span>
            </div>
            <div class="count-box">
                <span class="num">4</span>
                <span class="label">forever</span>
            </div>
        </div>

        <button id="enter-btn">START THE BEAUTIFUL STORY</button>
    </div>

    <div id="main-content">
        
        <div class="section" id="01-chapter-one">
            <h2 style="color: #ff0000;">01 — Chapter One</h2>
            <div class="roman-date">II XIV MMXXII</div>
            <div class="english-date">2 14 2022</div>
            <p class="sub-message">On this day God gave me an angel from the angels</p>
            
            <div class="image-gallery">
                <img src="chapter1-1.jpg" alt="Chapter 1 - Image 1" class="gallery-img">
                <img src="chapter1-2.jpg" alt="Chapter 1 - Image 2" class="gallery-img">
                <img src="chapter1-3.jpg" alt="Chapter 1 - Image 3" class="gallery-img">
                <img src="chapter1-4.jpg" alt="Chapter 1 - Image 4" class="gallery-img">
                <img src="chapter1-5.jpg" alt="Chapter 1 - Image 5" class="gallery-img">
            </div>
        </div>
        
        <div class="section" id="02-golden-memories">
            <h2 style="color: #ffd700;">02 — Golden memories</h2>
            <p class="sub-message">Do you know that life is nice because you are in it?</p>
            
            <div class="image-gallery">
                <img src="memory1.jpg" alt="Memory 1" class="gallery-img">
                <img src="memory2.jpg" alt="Memory 2" class="gallery-img">
                <img src="memory3.jpg" alt="Memory 3" class="gallery-img">
                <img src="memory4.jpg" alt="Memory 4" class="gallery-img">
                <img src="memory5.jpg" alt="Memory 5" class="gallery-img">
            </div>
        </div>

    </div>

    <div id="lightbox">
        <img id="lightbox-img" src="" alt="Zoomed View">
    </div>

    <script>
        // نظام الـ QR Code
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.get('source') === 'qr') {
            const qrMsg = document.getElementById('qr-msg');
            qrMsg.style.display = 'block';
            
            const elementsToHide = document.querySelectorAll('#logo-img, #countdown-block, #enter-btn');
            elementsToHide.forEach(el => el.style.opacity = '0');
            
            setTimeout(() => {
                elementsToHide.forEach(el => el.style.opacity = '1');
                qrMsg.style.display = 'none';
            }, 5000); 
        }

        // كود زرار START THE BEAUTIFUL STORY
        document.getElementById('enter-btn').addEventListener('click', function() {
            document.getElementById('bg-music').play().catch(err => console.log("Music play blocked or file missing"));
            document.getElementById('music-toggle').innerText = "🔇 Pause";
            
            const intro = document.getElementById('intro-screen');
            intro.style.opacity = '0';
            
            setTimeout(() => {
                intro.style.display = 'none';
                document.body.style.overflow = 'auto'; 
                
                const mainContent = document.getElementById('main-content');
                mainContent.style.display = 'block';
                mainContent.animate([{opacity: 0}, {opacity: 1}], {duration: 1500, fill: 'forwards'});
            }, 1500);
        });

        // تشغيل وإيقاف الموسيقى يدوياً
        document.getElementById('music-toggle').addEventListener('click', function() {
            const music = document.getElementById('bg-music');
            if (music.paused) {
                music.play();
                this.innerText = "🔇 Pause";
            } else {
                music.pause();
                this.innerText = "🔊 Play";
            }
        });

        /* كود تكبير الصور (Lightbox) */
        const galleryImages = document.querySelectorAll('.gallery-img');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        galleryImages.forEach(img => {
            img.addEventListener('click', () => {
                lightboxImg.src = img.src; 
                lightbox.classList.add('active'); 
            });
        });

        lightbox.addEventListener('click', () => {
            lightbox.classList.remove('active');
        });
    </script>
</body>
</html>
