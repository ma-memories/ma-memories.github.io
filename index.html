<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MA Memories</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#000;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

h1{
font-size:60px;
letter-spacing:8px;
}

p{
margin-top:20px;

color:#bbb;
}

span{

}

button{

padding:15px 40px;
background:white;
color:black;
border:none;
font-size:18px;

border-radius:50px;
transition:.3s;
}

button:hover{

color:white;
}
</style>

</head>

<body>

<div>

<h1>MA</h1>

<p>Try for yourself... and for <span>me</span>.</p>

<button>ENTER</button>
