<body>


<div id="rotate">

<div>

<div class="phone"></div>

<br>

Turn the phone to enjoy the story more

</div>

</div>



<!-- الصفحة الأولى -->

<div class="container" id="home">


<img src="447png.png" class="main-image">



<div class="numbers">


<div>
<h1>2</h1>
<p>Today</p>
</div>


<div>
<h1>2</h1>
<p>Tomorrow</p>
</div>


<div>
<h1>4</h1>
<p>Forever</p>
</div>


</div>



<button onclick="startStory()">

Start the beautiful story

</button>


</div>





<!-- Chapter 1 -->

<div class="container hidden" id="story">


<div class="chapter">



<div class="roman">

II XIV MMXXII

</div>


<div class="red">

2 14 2022

</div>



<p class="story-text">

And on this day God gave me an angel from the angels

</p>




<h1 class="chapter-title">

Chapter 1

</h1>




<img src="chapter1-1.jpg" class="story-image">

<img src="chapter1-2.jpg" class="story-image">

<img src="chapter1-3.jpg" class="story-image">

<img src="chapter1-4.jpg" class="story-image">

<img src="chapter1-5.jpg" class="story-image">



</div>


</div>






<script>


function startStory(){


document.getElementById("home").style.display="none";


let story = document.getElementById("story");


story.classList.remove("hidden");



window.scrollTo({

top:0,

behavior:"smooth"

});


}




// ظهور الصور مع النزول

const images = document.querySelectorAll(".story-image");



window.addEventListener("scroll",()=>{


images.forEach(img=>{


let position = img.getBoundingClientRect().top;



if(position < window.innerHeight - 100){


img.classList.add("show");


}



});


});



</script>


</body>

</html>
