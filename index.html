<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MA Memories</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#000;
    color:#fff;
}

.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.container{
    width:100%;
}

.logo{
    width:220px;
    max-width:80%;
    margin-bottom:30px;
    animation:fadeUp 1.5s ease;
}

p{
    font-size:24px;
    color:#bdbdbd;
    margin-bottom:40px;
    animation:fadeUp 2s ease;
}

.red{
    color:#ff0000;
}

button{
    background:#fff;
    color:#000;
    border:none;
    padding:18px 60px;
    border-radius:50px;
    font-size:24px;
    cursor:pointer;
    transition:.3s;
    animation:fadeUp 2.5s ease;
}

button:hover{
    background:#ff0000;
    color:#fff;
}

.section{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:40px;
}

.section h1{
    font-size:42px;
    margin-bottom:20px;
}

.section h2{
    color:#ff0000;
    margin-bottom:25px;
}

.section p{
    max-width:700px;
    line-height:1.8;
    font-size:22px;
}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<section class="hero">

<div class="container">

<img src="447png.png" class="logo">

<p>
Try for yourself... and for <span class="red">me</span>.
</p>

<button onclick="document.getElementById('beginning').scrollIntoView();">
ENTER
</button>

</div>

</section>

<section id="beginning" class="section">

<h1>01 — The Beginning</h1>

<h2>XVIII • VII • MMXXV</h2>

<p>
Every story has a beginning.
Mine started the moment everything changed.
</p>

</section>

</body>
</html>
