<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MA Memories</title>
<style>
/* --- الإعدادات الأساسية --- */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
html{scroll-behavior:smooth;}
body{background:#000;color:#fff;overflow-x:hidden;}

/* --- شاشة لف التليفون (تظهر بالطول فقط) --- */
#orientation-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #000;
    z-index: 9999;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}
@media screen and (orientation: portrait) {
    #orientation-overlay { display: flex; }
    body { overflow: hidden; /* منع السكرول والشاشة مقفولة */ }
}
@media screen and (orientation: landscape) {
    body { overflow: auto; }
}

/* أنيميشن التليفون */
.phone-animation {
    width: 60px;
    height: 110px;
    border: 4px solid #fff;
    border-radius: 12px;
    margin-bottom: 25px;
    position: relative;
    animation: rotatePhone 2s ease-in-out infinite;
}
.phone-animation::after {
    content: '';
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 15px;
    height: 4px;
    background: #fff;
    border-radius: 5px;
}
@keyframes rotatePhone {
    0% { transform: rotate(0deg); }
    50% { transform: rotate(90deg); }
    100% { transform: rotate(90deg); }
}
.orientation-text { color: #fff; font-size: 20px; letter-spacing: 1px; }

/* --- تصميم الموقع الأساسي --- */
.hero{height:100vh;display:flex;justify-content:center;align-items:center;text-align:center;padding:20px;}
.container{width:100%;}
.logo{width:220px;max-width:80%;margin-bottom:30px;animation:fadeUp 1.5s ease;}
.code{display:flex;justify-content:center;gap:60px;margin:20px 0 40px;animation:fadeUp 2s ease;}
.item{text-align:center;}
.item h2{font-size:42px;color:#fff;margin-bottom:8px;}
.item p{font-size:16px;color:#ff0000;}
button{background:#fff;color:#000;border:none;padding:18px 45px;border-radius:50px;font-size:20px;font-weight:bold;cursor:pointer;transition:.3s;animation:fadeUp 2.5s ease;}
button:hover{background:#ff0000;color:#fff;}

.section{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:80px 20px;}
.section h1{font-size:42px;margin-bottom:25px;}
.roman{font-size:30px;letter-spacing:5px;margin-bottom:10px;}
.date{color:#ff0000;font-size:18px;margin-bottom:35px;}
.story{max-width:700px;color:#bdbdbd;font-size:22px;line-height:1.8; margin-bottom: 50px;}

/* --- معرض الصور (صغيرة وتحت بعض) --- */
.gallery {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
    width: 100%;
}
.gallery img {
    width: 250px; /* حجم الصورة الصغير */
    border-radius: 15px;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(255,0,0,0.2);
    transition: transform 0.3s ease;
}
.gallery img:hover {
    transform: scale(1.05);
}

/* --- أنيميشن الظهور مع السكرول --- */
.reveal {
    opacity: 0;
    transform: translateY(60px);
    transition: all 0.8s ease-out;
}
.reveal.active {
    opacity: 1;
    transform: translateY(0);
}

/* --- نظام تكبير الصور (Lightbox) --- */
#lightbox {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.95);
    z-index: 10000;
    display: none;
    justify-content: center;
    align-items: center;
    cursor: zoom-out;
}
#lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
    animation: zoomIn 0.3s ease;
}
@keyframes zoomIn {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}
@keyframes fadeUp{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<!-- شاشة الإجبار على وضع العرض -->
<div id="orientation-overlay">
    <div class="phone-animation"></div>
    <p class="orientation-text">Turn the phone to see the story in a better way</p>
</div>

<section class="hero">
<div class="container">
<img src="447png.png" class="logo" alt="Logo">

<div class="code">
<div class="item"><h2>2</h2><p>Today</p></div>
<div class="item"><h2>2</h2><p>Tomorrow</p></div>
<div class="item"><h2>4</h2><p>Forever</p></div>
</div>

<button onclick="document.getElementById('chapter1').scrollIntoView();">
Start the Beautiful Story
</button>
</div>
</section>

<section id="chapter1" class="section">
<h1>01 — The First Chapter</h1>

<h2 class="roman">II • XIV • MMXXII</h2>

<p class="date">2 / 14 / 2022</p>

<!-- النص الجديد -->
<p class="story reveal">
On this day God gave me an angel of angels !
</p>

<!-- معرض الصور -->
<div class="gallery">
    <img src="chapter1-1.jpg" alt="Chapter 1 - image 1" class="reveal">
    <img src="chapter1-2.jpg" alt="Chapter 1 - image 2" class="reveal">
    <img src="chapter1-3.jpg" alt="Chapter 1 - image 3" class="reveal">
    <img src="chapter1-4.jpg" alt="Chapter 1 - image 4" class="reveal">
    <img src="chapter1-5.jpg" alt="Chapter 1 - image 5" class="reveal">
</div>
</section>

<!-- شاشة التكبير للصورة -->
<div id="lightbox">
    <img id="lightbox-img" src="" alt="Enlarged view">
</div>

<!-- سكريبت لتشغيل تأثير السكرول والتكبير -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    
    // 1. تشغيل تأثير ظهور الصور والنص مع السكرول (Scroll Reveal)
    const reveals = document.querySelectorAll('.reveal');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if(entry.isIntersecting) {
                entry.target.classList.add('active');
            }
        });
    }, { threshold: 0.15 }); // الصورة تبدأ تظهر لما 15% منها يبان في الشاشة
    
    reveals.forEach(el => observer.observe(el));

    // 2. تشغيل نظام تكبير الصور (Lightbox)
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const galleryImages = document.querySelectorAll('.gallery img');

    // لما تدوس على أي صورة في المعرض
    galleryImages.forEach(img => {
        img.addEventListener('click', () => {
            lightboxImg.src = img.src; // نقل مسار الصورة للشاشة الكبيرة
            lightbox.style.display = 'flex'; // إظهار الشاشة السودا
        });
    });

    // لما تدوس على الشاشة السودا عشان تقفل الصورة وترجع
    lightbox.addEventListener('click', () => {
        lightbox.style.display = 'none'; // إخفاء الشاشة
        lightboxImg.src = ''; // تفريغ المسار
    });

});
</script>

</body>
</html>
