<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MA Memories</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#000;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.container{
    width:100%;
    padding:20px;
}

.logo{
    width:220px;
    max-width:80%;
    margin-bottom:30px;
}

p{
    font-size:24px;
    color:#bdbdbd;
    margin-bottom:40px;
}

.red{
    color:#ff1a1a;
}

button{
    background:#fff;
    color:#000;
    border:none;
    padding:18px 60px;
    border-radius:50px;
    font-size:24px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#ff1a1a;
    color:#fff;
}
</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo" alt="MA Logo">

<p>Try for yourself... and for <span class="red">me</span>.</p>

<button>ENTER</button>

</div>

</body>
</html>
