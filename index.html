<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The New Birth</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Georgia,serif;
}

body{
background:#000;
color:white;
text-align:center;
overflow-x:hidden;
}


/* شاشة تدوير الهاتف */

#rotate{
position:fixed;
inset:0;
background:#000;
z-index:999;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}


.phone{
width:45px;
height:80px;
border:3px solid white;
border-radius:12px;
margin:auto;
animation:phoneRotate 2s infinite;
}


@keyframes phoneRotate{

0%{
transform:rotate(0deg);
}

50%{
transform:rotate(90deg);
}

100%{
transform:rotate(90deg);
}

}


@media (orientation:landscape){

#rotate{
display:none;
}

}


/* الصفحة الأولى */

.container{

padding:40px 20px;

}



.main-image{

width:90%;
max-width:550px;
border-radius:20px;

opacity:0;

animation:fadeZoom 2s forwards;

}



@keyframes fadeZoom{

from{

opacity:0;
transform:scale(.85);

}

to{

opacity:1;
transform:scale(1);

}

}




.numbers{

display:flex;
justify-content:center;
gap:45px;
margin:40px 0;

}


.numbers div{

opacity:0;

animation:upShow 1s forwards;

}


.numbers div:nth-child(1){

animation-delay:.5s;

}

.numbers div:nth-child(2){

animation-delay:1s;

}

.numbers div:nth-child(3){

animation-delay:1.5s;

}



.numbers h1{

font-size:50px;

}


.numbers p{

color:red;
font-size:18px;

}




button{

background:white;
color:black;

border:none;

padding:18px 40px;

border-radius:50px;

font-size:22px;

opacity:0;

animation:upShow 1s forwards;
animation-delay:2s;

cursor:pointer;

}


button:hover{

background:red;
color:white;

}




@keyframes upShow{

from{

opacity:0;
transform:translateY(40px);

}

to{

opacity:1;
transform:translateY(0);

}

}




/* الشابتر */


.hidden{

display:none;

}


.chapter{

padding-top:40px;

animation:chapterIn 2s ease;

}



@keyframes chapterIn{

from{

opacity:0;
transform:translateY(60px);

}

to{

opacity:1;
transform:translateY(0);

}

}



.roman{

font-size:45px;
letter-spacing:5px;

}


.red{

color:red;
font-size:22px;

}


.story-text{

color:#ccc;

font-size:22px;

line-height:1.7;

margin:35px 20px;

}


.chapter-title{

font-size:45px;

margin:40px 0;

}



/* الصور */


.story-image{

width:90%;
max-width:600px;

border-radius:20px;

margin:30px 0;

opacity:0;

transform:translateY(50px) scale(.9);

transition:1.5s ease;

}


.story-image.show{

opacity:1;

transform:translateY(0) scale(1);

}


</style>
</head>
<body>


<div id="rotate">

<div>

<div class="phone"></div>

<br>

Turn the phone to enjoy the story more

</div>

</div>



<!-- الصفحة الأولى -->

<div class="container" id="home">


<img src="447png.png" class="main-image">



<div class="numbers">


<div>
<h1>2</h1>
<p>Today</p>
</div>


<div>
<h1>2</h1>
<p>Tomorrow</p>
</div>


<div>
<h1>4</h1>
<p>Forever</p>
</div>


</div>



<button onclick="startStory()">

Start the beautiful story

</button>


</div>





<!-- Chapter 1 -->

<div class="container hidden" id="story">


<div class="chapter">



<div class="roman">

II XIV MMXXII

</div>


<div class="red">

2 14 2022

</div>



<p class="story-text">

And on this day God gave me an angel from the angels

</p>




<h1 class="chapter-title">

Chapter 1

</h1>




<img src="chapter1-1.jpg" class="story-image">

<img src="chapter1-2.jpg" class="story-image">

<img src="chapter1-3.jpg" class="story-image">

<img src="chapter1-4.jpg" class="story-image">

<img src="chapter1-5.jpg" class="story-image">



</div>


</div>






<script>


function startStory(){


document.getElementById("home").style.display="none";


let story = document.getElementById("story");


story.classList.remove("hidden");



window.scrollTo({

top:0,

behavior:"smooth"

});


}




// ظهور الصور مع النزول

const images = document.querySelectorAll(".story-image");



window.addEventListener("scroll",()=>{


images.forEach(img=>{


let position = img.getBoundingClientRect().top;



if(position < window.innerHeight - 100){


img.classList.add("show");


}



});


});



</script>


</body>

</html>
